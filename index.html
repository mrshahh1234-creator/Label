<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Tabriz Group - Печать по листам</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .no-print { max-width: 900px; margin: 0 auto; }
        .panel { background: white; padding: 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; font-size: 1.4em; }
        
        .sheets-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 15px; }
        .sheet-btn { padding: 15px 25px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .sheet-btn:hover { background: #0056b3; transform: translateY(-2px); }
        .sheet-btn.active { background: #28a745; box-shadow: 0 0 0 4px rgba(40,167,69,0.2); }

        .parts-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 20px; }
        .part-card { border: 1px solid #e0e0e0; padding: 15px; border-radius: 10px; background: #fff; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .part-card:hover { border-color: #007bff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .part-info b { font-size: 1.2em; color: #2c3e50; display: block; }
        .part-info span { color: #666; font-size: 0.9em; }
        
        .print-btn { background: #28a745; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .print-btn:hover { background: #218838; }

        /* ЭТИКЕТКА 80x60 мм */
        @page { size: 80mm 60mm; margin: 0; }
        #print-area { display: none; }
        
        .label-sticker {
            width: 80mm; height: 60mm; background: white; 
            padding: 2mm; box-sizing: border-box;
            position: relative; font-family: Arial, sans-serif; overflow: hidden;
            border: 1px solid #eee; /* Видно только в браузере */
        }

        .header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #000; padding-bottom: 1mm; }
        .logo-txt { font-size: 18px; font-weight: 900; }
        .logo-sub { font-size: 10px; font-weight: normal; }
        .academy-box { font-size: 7px; text-align: center; font-weight: bold; line-height: 1; }

        .data-row { font-size: 10px; font-weight: bold; margin-top: 1mm; line-height: 1.2; }
        .main-size { font-size: 24px; font-weight: bold; text-align: center; margin: 4mm 0; }

        .drawing { 
            position: absolute; bottom: 4mm; left: 4mm; 
            width: 35mm; height: 15mm; border: 1px solid black;
        }
        .dim { position: absolute; font-size: 8px; font-weight: bold; }
        .dim-x { bottom: -12px; left: 40%; }
        .dim-y { right: -15px; top: 35%; transform: rotate(90deg); }

        .qr-side { position: absolute; right: 2mm; top: 15mm; text-align: center; }
        .qr-box { width: 16mm; height: 16mm; margin-bottom: 2mm; }
        .qr-label { font-size: 7px; display: block; font-family: monospace; }
        
        .time-stamp { position: absolute; right: 2mm; bottom: 1mm; font-size: 7px; color: #444; }

        @media print {
            .no-print { display: none !important; }
            #print-area { display: block; }
            .label-sticker { border: none; page-break-after: always; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <div class="panel">
        <h2>1. Файл заказа (.CUT)</h2>
        <input type="file" id="fileInput" accept=".CUT">
    </div>

    <div class="panel" id="sheetsPanel" style="display: none;">
        <h2>2. Выберите лист для раскроя</h2>
        <div class="sheets-grid" id="sheetsContainer"></div>
    </div>

    <div class="panel" id="partsPanel" style="display: none;">
        <h2 id="partsTitle">3. Список деталей</h2>
        <div class="parts-list" id="partsContainer"></div>
    </div>
</div>

<div id="print-area"></div>

<script>
    let objectiveShapes = {}; 
    let projectInfo = { name: "", material: "" };

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(event.target.result, "text/xml");
            
            // Название проекта (Листа) и материал 
            const projectNode = xml.querySelector('Project');
            const dataNode = xml.querySelector('Data');
            projectInfo.name = projectNode ? projectNode.getAttribute('Name') : "Заказ";
            projectInfo.material = dataNode ? dataNode.getAttribute('TypeName') : "ЛДСП";

            // Собираем базу эталонных деталей (Objective -> Shape) 
            const shapes = xml.querySelectorAll('Objective Shape');
            objectiveShapes = {};
            shapes.forEach((s, index) => {
                objectiveShapes[index] = {
                    name: s.getAttribute('Name'),
                    x: s.getAttribute('X'),
                    y: s.getAttribute('Y')
                };
            });

            renderSheets(xml);
        };
        reader.readAsText(file);
    });

    function renderSheets(xml) {
        document.getElementById('sheetsPanel').style.display = 'block';
        const container = document.getElementById('sheetsContainer');
        container.innerHTML = '';
        
        const layouts = xml.querySelectorAll('Layout');
        layouts.forEach((layout, index) => {
            const btn = document.createElement('button');
            btn.className = 'sheet-btn';
            btn.innerText = `ЛИСТ №${index + 1} (${layout.getAttribute('X')}x${layout.getAttribute('Y')})`;
            btn.onclick = () => {
                document.querySelectorAll('.sheet-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderParts(layout, index + 1);
            };
            container.appendChild(btn);
        });
    }

    function renderParts(layoutNode, num) {
        document.getElementById('partsPanel').style.display = 'block';
        document.getElementById('partsTitle').innerText = `3. Детали на листе №${num}`;
        const container = document.getElementById('partsContainer');
        container.innerHTML = '';

        const parts = layoutNode.querySelectorAll('Part[UID]');
        parts.forEach(part => {
            const uid = part.getAttribute('UID');
            const data = objectiveShapes[uid];
            if (!data) return;

            const card = document.createElement('div');
            card.className = 'part-card';
            card.innerHTML = `
                <div class="part-info">
                    <b>${data.name}</b>
                    <span>${data.x} x ${data.y} мм</span>
                </div>
                <button class="print-btn" onclick="printLabel('${uid}')">Печать</button>
            `;
            container.appendChild(card);
        });
    }

    function printLabel(uid) {
        const data = objectiveShapes[uid];
        const area = document.getElementById('print-area');
        const now = new Date();
        const dateStr = now.toLocaleString('ru-RU').replace(',', '');

        area.innerHTML = `
            <div class="label-sticker">
                <div class="header">
                    <div class="logo-txt">TABRIZ <span class="logo-sub">GROUP</span></div>
                    <div class="academy-box">MUSTAFAYEV<br>ACADEMY</div>
                </div>
                <div class="data-row">
                    Mat: ${projectInfo.material}<br>
                    №: ${projectInfo.name}<br>
                    Model: Модель 9 <span style="margin-left:10mm">Soni: 1</span><br>
                    Nomi: ${data.name}
                </div>
                <div class="main-size">${data.x} x ${data.y}</div>
                <div class="drawing">
                    <div class="dim dim-x">${data.x}</div>
                    <div class="dim dim-y">${data.y}</div>
                </div>
                <div class="qr-side">
                    <div id="q1" class="qr-box"></div>
                    <span class="qr-label">01_025_1_1</span>
                    <div id="q2" class="qr-box" style="margin-top:2mm"></div>
                    <span class="qr-label">01_025_1_2</span>
                </div>
                <div class="time-stamp">${dateStr}</div>
            </div>
        `;

        new QRCode(document.getElementById("q1"), { text: data.name + "_1", width: 60, height: 60 });
        new QRCode(document.getElementById("q2"), { text: data.name + "_2", width: 60, height: 60 });

        setTimeout(() => { window.print(); }, 250);
    }
</script>
</body>
</html>
