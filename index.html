<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabriz Group - Печать Этикеток</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --border-clr: #000; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background: #f0f2f5; }
        
        /* Панель управления */
        .admin-panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .file-upload { border: 2px dashed #007bff; padding: 20px; text-align: center; cursor: pointer; border-radius: 8px; }
        
        /* Список деталей (Крой-лист) */
        .parts-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .part-item { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; transition: 0.2s; }
        .part-item:hover { border-color: #007bff; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .part-item b { font-size: 1.2em; display: block; margin-bottom: 5px; }

        /* Дизайн этикетки (как на фото) */
        #print-area { display: none; }
        .label-box {
            width: 100mm; height: 80mm; /* Примерный размер термоэтикетки */
            background: white; border: 1px solid black;
            padding: 5px; position: relative; box-sizing: border-box;
            color: black; page-break-after: always;
        }
        
        .header-top { display: flex; justify-content: space-between; align-items: start; }
        .main-logo { width: 180px; font-weight: 900; font-size: 22px; letter-spacing: 1px; }
        .sub-logo { width: 80px; text-align: center; font-size: 8px; font-weight: bold; line-height: 1; }
        
        .info-grid { font-size: 12px; margin-top: 5px; line-height: 1.3; }
        .pvc-badges { display: flex; gap: 10px; margin: 10px 0; }
        .pvc-item { border: 1.5px solid black; padding: 2px 8px; font-size: 14px; font-weight: bold; width: 110px; text-align: center; }
        
        .main-dimensions { font-size: 32px; font-weight: bold; text-align: center; margin: 5px 0; }
        
        .drawing-area { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; }
        .rect-draw { width: 120px; height: 70px; border: 2px solid black; position: relative; margin-left: 40px; }
        .dim-label { position: absolute; font-size: 10px; font-weight: bold; }
        
        .qr-codes-right { position: absolute; right: 5px; top: 110px; display: flex; flex-direction: column; gap: 15px; }
        .qr-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: bold; }
        
        .timestamp { position: absolute; right: 5px; bottom: 5px; font-size: 9px; }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { display: block; position: absolute; left: 0; top: 0; width: 100%; }
            .admin-panel, .parts-list { display: none !important; }
        }
    </style>
</head>
<body>

<div class="admin-panel">
    <h2 style="margin-top:0">TABRIZ GROUP | Система маркировки</h2>
    <div class="file-upload" onclick="document.getElementById('fileInput').click()">
        Нажмите, чтобы загрузить файл <b>.CUT</b> (AutoCUT)
        <input type="file" id="fileInput" accept=".CUT,.xml" style="display:none">
    </div>
    <div id="fileInfo" style="margin-top:10px; font-weight:bold; color:#007bff"></div>
</div>

<div class="parts-list" id="partsContainer">
    </div>

<div id="print-area">
    </div>

<script>
    let currentProject = {};

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('fileInfo').innerText = "Загружен файл: " + file.name;
        const reader = new FileReader();
        reader.onload = function(e) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(e.target.result, "text/xml");
            
            // Собираем данные проекта 
            currentProject = {
                name: xml.querySelector('Project').getAttribute('Name'),
                material: xml.querySelector('Data').getAttribute('TypeName'),
                date: xml.querySelector('Project').getAttribute('Update')
            };

            const shapes = xml.querySelectorAll('Objective Shape');
            renderPartsList(shapes);
        };
        reader.readAsText(file);
    });

    function renderPartsList(shapes) {
        const container = document.getElementById('partsContainer');
        container.innerHTML = '';

        shapes.forEach(shape => {
            const count = parseInt(shape.getAttribute('Count'));
            if (count > 0) {
                const item = document.createElement('div');
                item.className = 'part-item';
                item.innerHTML = `
                    <b>Деталь: ${shape.getAttribute('Name')}</b>
                    <span>Размер: ${shape.getAttribute('X')} x ${shape.getAttribute('Y')}</span><br>
                    <span>Кол-во: ${count} шт.</span>
                `;
                item.onclick = () => generateLabel(shape);
                container.appendChild(item);
            }
        });
    }

    function generateLabel(shape) {
        const printArea = document.getElementById('print-area');
        const name = shape.getAttribute('Name');
        const x = shape.getAttribute('X');
        const y = shape.getAttribute('Y');
        const now = new Date().toLocaleString();

        printArea.innerHTML = `
            <div class="label-box">
                <div class="header-top">
                    <div class="main-logo">TABRIZ <small>GROUP</small></div>
                    <div class="sub-logo">MUSTAFAYEV<br>ACADEMY</div>
                </div>

                <div class="info-grid">
                    <div>Mat: ${currentProject.material}</div>
                    <div>№ : ${name}</div>
                    <div style="display:flex; justify-content:space-between">
                        <span>Model: ${currentProject.name}</span>
                        <span>Soni: 1</span>
                    </div>
                    <div>Nomi: Деталь мебели</div>
                </div>

                <div class="pvc-badges">
                    <div class="pvc-item">ПВХ 0.4 / 19</div>
                    <div class="pvc-item">ПВХ 0.4 / 19</div>
                </div>

                <div class="main-dimensions">${x} x ${y}</div>

                <div class="pvc-badges">
                    <div class="pvc-item">ПВХ 2 / 19</div>
                    <div class="pvc-item">ПВХ 2 / 19</div>
                </div>

                <div class="drawing-area">
                    <div class="rect-draw">
                        <div class="dim-label" style="top:-15px; left:40%">(X) 2</div>
                        <div class="dim-label" style="bottom:-15px; left:40%">(X) 2</div>
                        <div class="dim-label" style="left:-35px; top:40%; transform:rotate(-90deg)">(X) 2</div>
                        <div class="dim-label" style="right:-35px; top:40%; transform:rotate(90deg)">(X) 2</div>
                        <div style="position:absolute; right:-45px; bottom:0; font-size:8px">${y}</div>
                        <div style="position:absolute; bottom:-25px; left:35%; font-size:8px">${x}</div>
                    </div>
                </div>

                <div class="qr-codes-right">
                    <div class="qr-item"><div id="qr1"></div>01_025_1_1</div>
                    <div class="qr-item"><div id="qr2"></div>01_025_1_2</div>
                </div>

                <div class="timestamp">${now}</div>
            </div>
        `;

        // Генерация QR-кодов
        new QRCode(document.getElementById("qr1"), { text: name + "_1", width: 50, height: 50 });
        new QRCode(document.getElementById("qr2"), { text: name + "_2", width: 50, height: 50 });

        window.print();
    }
</script>

</body>
</html>
